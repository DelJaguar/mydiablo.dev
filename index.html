<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diablo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050505;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ================================================
       DEVIL IMAGES — 50 drop from top, bounce at center
       ================================================ */
    .devil {
      position: fixed;
      width: 56px;
      height: 56px;
      top: -80px;
      z-index: 10;
      filter: drop-shadow(0 0 8px rgba(180, 20, 0, 0.55));
      animation: devil-drop 2.4s ease-in forwards;
    }

    .devil img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes devil-drop {
      0%   { transform: translateY(0);                  opacity: 1; animation-timing-function: ease-in; }
      52%  { transform: translateY(calc(50vh + 60px));  animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94); }
      70%  { transform: translateY(calc(28vh + 60px));  animation-timing-function: ease-in; }
      84%  { transform: translateY(calc(48vh + 60px));  animation-timing-function: linear; }
      91%  { transform: translateY(calc(48vh + 60px));  opacity: 1; }
      100% { transform: translateY(calc(48vh + 60px));  opacity: 0; }
    }

    /* ================================================
       ENDSCREEN — large icon + button (30s after title)
       ================================================ */
    .endscreen {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      z-index: 25;
      opacity: 0;
      animation: endscreen-in 1.2s ease-out 15.5s forwards;
    }

    @keyframes endscreen-in {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .endscreen img {
      width: min(280px, 45vw);
      height: min(280px, 45vw);
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(180, 20, 0, 0.6)) drop-shadow(0 0 60px rgba(120, 0, 0, 0.4));
    }

    .todo-btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(180deg, #2a0000 0%, #0d0000 100%);
      color: #ff3300;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: bold;
      letter-spacing: 0.12em;
      text-decoration: none;
      border: 2px solid #8b0000;
      box-shadow:
        0 0 12px rgba(180, 0, 0, 0.5),
        0 0 30px rgba(120, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 60, 0, 0.15);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s, border-color 0.2s;
    }

    .todo-btn:hover {
      background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%);
      color: #ff6633;
      border-color: #cc0000;
      box-shadow:
        0 0 20px rgba(220, 0, 0, 0.7),
        0 0 50px rgba(180, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 80, 0, 0.2);
    }

    /* ================================================
       TITLE TEXT
       ================================================ */
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: bold;
      color: #ff4400;
      text-shadow:
        0 0 20px #ff4400,
        0 0 40px #ff2200,
        0 0 80px #cc0000,
        0 0 120px #880000,
        2px 2px 4px #000;
      letter-spacing: 0.08em;
      white-space: nowrap;
      opacity: 0;
      z-index: 20;
      animation: flash-in 1s ease-out 4.4s forwards,
                 glow-pulse 2s ease-in-out 5.4s infinite alternate,
                 fade-out 1s ease-in 14.4s forwards;
    }

    @keyframes flash-in {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
        text-shadow: 0 0 80px #fff, 0 0 160px #ff4400, 0 0 300px #ff2200;
        letter-spacing: 0.3em;
      }
      35% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.08);
        text-shadow: 0 0 60px #fff, 0 0 120px #ff4400, 0 0 200px #ff2200;
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        text-shadow: 0 0 20px #ff4400, 0 0 40px #ff2200, 0 0 80px #cc0000, 0 0 120px #880000, 2px 2px 4px #000;
        letter-spacing: 0.08em;
      }
    }

    @keyframes fade-out {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes glow-pulse {
      0% {
        text-shadow: 0 0 20px #ff4400, 0 0 40px #ff2200, 0 0 80px #cc0000, 0 0 120px #880000, 2px 2px 4px #000;
        color: #ff4400;
      }
      100% {
        text-shadow: 0 0 30px #ff6600, 0 0 60px #ff4400, 0 0 100px #ff2200, 0 0 160px #cc0000, 2px 2px 4px #000;
        color: #ff5500;
      }
    }

    /* ================================================
       FLASH OVERLAY — hellfire burst
       ================================================ */
    .flash-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      z-index: 15;
      pointer-events: none;
      animation: fire-flash 0.7s ease-out 4.1s forwards;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(255,100,30,0.9) 0%,
        rgba(255,50,0,0.6) 30%,
        rgba(200,20,0,0.3) 60%,
        transparent 80%
      );
    }

    @keyframes fire-flash {
      0%   { opacity: 0; transform: scale(0.5); }
      15%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(2); }
    }

    /* ================================================
       EMBER PARTICLES
       ================================================ */
    .embers {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      animation: embers-in 1.5s ease-out 4.8s forwards;
    }
    @keyframes embers-in { to { opacity: 1; } }

    .ember {
      position: absolute;
      border-radius: 50%;
      animation: float-up linear infinite;
    }

    .ember:nth-child(1)  { width: 3px; height: 3px; background: #ff4400; box-shadow: 0 0 6px #ff4400, 0 0 12px rgba(255,68,0,0.3); left: 6%;  bottom: -3%; animation-delay: 0s;   animation-duration: 5s; }
    .ember:nth-child(2)  { width: 2px; height: 2px; background: #ff6600; box-shadow: 0 0 4px #ff6600; left: 15%; bottom: -3%; animation-delay: 0.8s; animation-duration: 6s; }
    .ember:nth-child(3)  { width: 4px; height: 4px; background: #ff3300; box-shadow: 0 0 8px #ff3300, 0 0 16px rgba(255,51,0,0.3); left: 28%; bottom: -3%; animation-delay: 1.4s; animation-duration: 4.5s; }
    .ember:nth-child(4)  { width: 2px; height: 2px; background: #ff5500; box-shadow: 0 0 5px #ff5500; left: 40%; bottom: -3%; animation-delay: 0.3s; animation-duration: 5.5s; }
    .ember:nth-child(5)  { width: 3px; height: 3px; background: #ff4400; box-shadow: 0 0 6px #ff4400; left: 52%; bottom: -3%; animation-delay: 1.1s; animation-duration: 4.8s; }
    .ember:nth-child(6)  { width: 2px; height: 2px; background: #ff7700; box-shadow: 0 0 4px #ff7700; left: 64%; bottom: -3%; animation-delay: 1.8s; animation-duration: 6.2s; }
    .ember:nth-child(7)  { width: 3px; height: 3px; background: #ff2200; box-shadow: 0 0 7px #ff2200, 0 0 14px rgba(255,34,0,0.3); left: 75%; bottom: -3%; animation-delay: 0.6s; animation-duration: 5.2s; }
    .ember:nth-child(8)  { width: 2px; height: 2px; background: #ff5500; box-shadow: 0 0 4px #ff5500; left: 86%; bottom: -3%; animation-delay: 1.3s; animation-duration: 4.6s; }
    .ember:nth-child(9)  { width: 1px; height: 1px; background: #ffaa00; box-shadow: 0 0 3px #ffaa00; left: 20%; bottom: -3%; animation-delay: 2.1s; animation-duration: 5.8s; }
    .ember:nth-child(10) { width: 2px; height: 2px; background: #ff3300; box-shadow: 0 0 5px #ff3300; left: 46%; bottom: -3%; animation-delay: 0.2s; animation-duration: 5.1s; }
    .ember:nth-child(11) { width: 1px; height: 1px; background: #ff8800; box-shadow: 0 0 3px #ff8800; left: 70%; bottom: -3%; animation-delay: 2.4s; animation-duration: 6.5s; }
    .ember:nth-child(12) { width: 3px; height: 3px; background: #ff4400; box-shadow: 0 0 6px #ff4400; left: 33%; bottom: -3%; animation-delay: 1.6s; animation-duration: 4.9s; }
    .ember:nth-child(13) { width: 1px; height: 1px; background: #ff6600; box-shadow: 0 0 4px #ff6600; left: 58%; bottom: -3%; animation-delay: 0.9s; animation-duration: 5.7s; }
    .ember:nth-child(14) { width: 2px; height: 2px; background: #cc2200; box-shadow: 0 0 4px #cc2200; left: 82%; bottom: -3%; animation-delay: 2.0s; animation-duration: 5.4s; }
    .ember:nth-child(15) { width: 2px; height: 2px; background: #ff5500; box-shadow: 0 0 5px #ff5500; left: 11%; bottom: -3%; animation-delay: 1.0s; animation-duration: 6.1s; }

    @keyframes float-up {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
      15%  { transform: translateY(-15vh) translateX(6px) scale(0.95); opacity: 0.95; }
      35%  { transform: translateY(-35vh) translateX(-8px) scale(0.8); opacity: 0.8; }
      55%  { transform: translateY(-55vh) translateX(10px) scale(0.6); opacity: 0.55; }
      75%  { transform: translateY(-75vh) translateX(-4px) scale(0.35); opacity: 0.3; }
      100% { transform: translateY(-105vh) translateX(5px) scale(0); opacity: 0; }
    }

    /* ================================================
       VIGNETTE & ATMOSPHERE
       ================================================ */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 1;
    }
    body::before {
      content: '';
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 30%;
      background: linear-gradient(180deg, transparent 0%, rgba(40,5,0,0.04) 50%, rgba(30,3,0,0.08) 100%);
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>

  <!-- 50 falling devils (spawned by JS) -->
  <div id="devils-container"></div>

  <!-- Endscreen: large icon + button -->
  <div class="endscreen">
    <img src="favicon-rounded.png" alt="Diablo">
    <a class="todo-btn" href="https://todo.mydiablo.dev">To Do App</a>
  </div>

  <!-- Flash overlay -->
  <div class="flash-overlay"></div>

  <!-- Title -->
  <div class="title">My Diablo...</div>

  <!-- Ember particles -->
  <div class="embers">
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
  </div>

  <script>
    const container = document.getElementById('devils-container');
    for (let i = 0; i < 50; i++) {
      const div = document.createElement('div');
      div.className = 'devil';
      div.style.left = (Math.random() * 88 + 2) + 'vw';
      div.style.animationDelay = (Math.random() * 1.8).toFixed(3) + 's';
      const img = document.createElement('img');
      img.src = 'favicon-rounded.png';
      img.alt = 'Diablo';
      div.appendChild(img);
      container.appendChild(div);
    }
  </script>

</body>
</html>
